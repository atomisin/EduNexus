name: Frontend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    - name: Set up Python for codegen
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Generate frontend constants from backend
      run: python backend/scripts/generate_frontend_constants.py
    - name: Type check
      run: |
        cd frontend
        npx tsc --noEmit
    - name: Run unit tests
      run: |
        cd frontend
        npm run test:run
    - name: Build
      run: |
        cd frontend
        npm run build
