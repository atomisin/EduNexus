version: '3.8'
services:
  test-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: edunexus_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: edunexus_test
    ports:
      - "5433:5432"  # Different port from dev DB
    tmpfs:
      - /var/lib/postgresql/data  # In-memory, fast
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edunexus_test"]
      interval: 5s
      timeout: 5s
      retries: 5
